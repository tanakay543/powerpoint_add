<!DOCTYPE html>
<html lang="ja" class="light">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PPT Quick Insert</title>

  <!-- Office.js -->
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" crossorigin="anonymous"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0043c8",
            "primary-container": "#0057ff",
            "on-primary": "#ffffff",
            "on-primary-container": "#e5e8ff",
            "secondary": "#5d5e63",
            "secondary-container": "#e0dfe4",
            "on-secondary": "#ffffff",
            "on-secondary-container": "#626267",
            "surface": "#fcf8fb",
            "surface-dim": "#dcd9dc",
            "surface-bright": "#fcf8fb",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f6f3f5",
            "surface-container": "#f0edef",
            "surface-container-high": "#eae7ea",
            "surface-container-highest": "#e4e2e4",
            "surface-variant": "#e4e2e4",
            "on-surface": "#1b1b1d",
            "on-surface-variant": "#434656",
            "outline": "#737688",
            "outline-variant": "#c3c5d9",
            "background": "#fcf8fb",
            "on-background": "#1b1b1d"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px"
          },
          spacing: {
            xs: "4px",
            sm: "8px",
            md: "16px",
            lg: "24px",
            xl: "32px",
            xxl: "64px"
          },
          fontFamily: {
            display: ["Inter", "sans-serif"],
            body: ["Inter", "sans-serif"]
          },
          fontSize: {
            "display": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }],
            "headline-lg": ["32px", { lineHeight: "1.2", letterSpacing: "-0.01em", fontWeight: "600" }],
            "headline-md": ["20px", { lineHeight: "1.3", letterSpacing: "-0.01em", fontWeight: "600" }],
            "body-lg": ["16px", { lineHeight: "1.5", letterSpacing: "0", fontWeight: "400" }],
            "body-md": ["14px", { lineHeight: "1.5", letterSpacing: "0", fontWeight: "400" }],
            "label-md": ["12px", { lineHeight: "1.2", letterSpacing: "0.02em", fontWeight: "500" }],
            "label-sm": ["11px", { lineHeight: "1.2", letterSpacing: "0.05em", fontWeight: "600" }]
          },
          boxShadow: {
            "level-2": "0px 4px 12px rgba(0, 0, 0, 0.05), 0px 1px 2px rgba(0, 0, 0, 0.02)",
            "level-3": "0px 8px 24px rgba(0, 0, 0, 0.08), 0px 2px 4px rgba(0, 0, 0, 0.03)"
          }
        }
      }
    }
  </script>

  <!-- Custom Styles -->
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .material-symbols-outlined[data-weight="fill"] {
      font-variation-settings: 'FILL' 1;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #e4e2e4;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #c3c5d9;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-surface text-on-background font-body antialiased h-screen overflow-hidden">
  <div id="root"></div>
</body>
</html>
